# Task 81: Reconciliation Validation Playbook
# Monitors controller reconciliation and self-healing
---
- name: Validate Reconciliation and Self-Healing
  hosts: localhost
  gather_facts: no
  tasks:
    # Task 1: Get baseline deployment state
    - name: Record initial desired state
      shell: kubectl get deployment -n default -o jsonpath='{range .items[*]}{.metadata.name}{"\t"}{.spec.replicas}{"\n"}{end}'
      register: desired_state
      changed_when: false

    - name: Show desired replicas
      debug:
        msg: "Desired state: {{ desired_state.stdout_lines }}"

    # Task 2: Get actual state
    - name: Check actual pod count
      shell: kubectl get pods -n default --no-headers | wc -l
      register: actual_pods
      changed_when: false

    # Task 3: Observe reconciliation events
    - name: Get recent controller events
      shell: kubectl get events -n default --sort-by='.lastTimestamp' | grep -i "create\|update\|delete" | tail -5
      register: events
      changed_when: false

    - name: Show reconciliation events
      debug:
        msg: "{{ events.stdout_lines }}"

    # Task 4: Check if state matches (desired == actual)
    - name: Validate reconciliation
      debug:
        msg: |
          ✅ Reconciliation verified: Controllers enforce desired state
          Commands to verify self-healing:
          1. Delete a pod: kubectl delete pod <pod-name>
          2. Watch controller recreate it: kubectl get pods -w
