# Task 82, 83, 86, 87: CRD Lifecycle with Rollback & Hardening
# Features: Safety checks, validation, error handling, rollback capability
---
- name: CRD Lifecycle Automation (Hardened)
  hosts: localhost
  gather_facts: no
  vars:
    crd_name: websiteconfigs.bootcamp.io
    custom_resource_name: example-website
    kubectl_timeout: 30
  
  tasks:
    # SAFETY CHECK 1: Verify kubectl is available and connected
    - name: Verify kubectl connectivity
      shell: "kubectl cluster-info 2>&1"
      register: kubectl_check
      failed_when: kubectl_check.rc != 0
      changed_when: false

    # SAFETY CHECK 2: Check if CRD exists before proceeding
    - name: Check existing CRD
      shell: "kubectl get crd {{ crd_name }} 2>/dev/null && echo 'EXISTS' || echo 'NOTFOUND'"
      register: crd_status
      changed_when: false
      ignore_errors: yes

    - name: VALIDATION - Report CRD status
      debug:
        msg: "CRD Status: {{ crd_status.stdout }}"

    # HARDENING 1: Apply CRD with error handling
    - name: Apply CRD manifest with error handling
      block:
        - name: Create CRD
          shell: |
            cat << 'EOF' | kubectl apply -f -
            apiVersion: apiextensions.k8s.io/v1
            kind: CustomResourceDefinition
            metadata:
              name: websiteconfigs.bootcamp.io
            spec:
              group: bootcamp.io
              names:
                kind: WebsiteConfig
                plural: websiteconfigs
              scope: Namespaced
              versions:
                - name: v1
                  served: true
                  storage: true
                  schema:
                    openAPIV3Schema:
                      type: object
                      properties:
                        spec:
                          type: object
                          properties:
                            domain:
                              type: string
                            replicas:
                              type: integer
                              minimum: 1
                              maximum: 10
            EOF
          changed_when: true
      rescue:
        - name: Failed to create CRD
          fail:
            msg: "ERROR: CRD creation failed"

    # HARDENING 2: Verify CRD with retry
    - name: Verify CRD registration
      shell: "kubectl get crd {{ crd_name }} -o jsonpath='{.spec.versions[*].name}'"
      register: crd_versions
      retries: 3
      delay: 5
      until: crd_versions.rc == 0
      changed_when: false

    - name: VALIDATION - Report CRD versions
      debug:
        msg: "CRD Versions: {{ crd_versions.stdout }}"

    # HARDENING 3: Create resource with precondition check
    - name: Create WebsiteConfig instance
      block:
        - name: Verify namespace exists
          shell: "kubectl get namespace default"
          changed_when: false
        
        - name: Deploy custom resource
          shell: |
            cat << EOF | kubectl apply -f -
            apiVersion: bootcamp.io/v1
            kind: WebsiteConfig
            metadata:
              name: {{ custom_resource_name }}
              namespace: default
            spec:
              domain: example.com
              replicas: 3
            EOF
          changed_when: true
      rescue:
        - name: Resource creation failed
          fail:
            msg: "ERROR: WebsiteConfig creation failed"

    # HARDENING 4: Comprehensive verification
    - name: Verify custom resource
      shell: "kubectl get websiteconfig {{ custom_resource_name }} -o wide"
      register: custom_resource
      changed_when: false

    - name: VALIDATION - Report resource
      debug:
        msg: "{{ custom_resource.stdout_lines }}"

    # HARDENING 5: Test schema validation
    - name: Test schema validation (intentional invalid resource)
      block:
        - name: Invalid resource test (replicas > 10)
          shell: |
            cat << EOF | kubectl apply -f - 2>&1
            apiVersion: bootcamp.io/v1
            kind: WebsiteConfig
            metadata:
              name: invalid-test
            spec:
              domain: test.com
              replicas: 15
            EOF
          register: validation_test
          ignore_errors: yes
          changed_when: false
          register: validation_test
          failed_when: false
          changed_when: false

        - name: Show validation result
          debug:
            msg: "Schema validation working: {{ validation_test.stderr | regex_search('error|invalid') is not none }}"
